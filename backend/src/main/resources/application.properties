# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=proxisense-backend

# ─── Database ────────────────────────────────────────────────────────────────
#   SPRING_DATASOURCE_URL  (e.g. jdbc:mysql://aiven-host:3306/proxisense?useSSL=true&serverTimezone=UTC)
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET (Random 256-bit string)
#   CORS_ALLOWED_ORIGINS (e.g. https://proxisense.vercel.app)
#   GEMINI_API_KEY (Your Google AI Key)
#   ML_SERVICE_URL (Deployed Render URL for Python service)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/proxisense?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Pruthvi@2324}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# SECURITY: Override JWT_SECRET with a strong 256-bit random secret in production.
jwt.secret=${JWT_SECRET:ProxiSense-S3cur3-JWT-Secret-Key-256bit-MustBeChangedInProd!2024}
jwt.expiration=604800000

# ─── File Uploads (Local Storage) ────────────────────────────────────────────
# Files are stored in this directory relative to the working directory.
# Future: replace with Cloudinary/S3 integration in FileStorageService.
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── Email (Optional — Safe to leave unconfigured for dev) ───────────────────
# If not configured, emails fail silently (caught in BookingService).
# Configure these environment variables to enable email:
#   MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── CORS ────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS env var in production (comma-separated URLs).
# Example: https://proxisense.vercel.app,http://localhost:3000
# SecurityConfig.java reads System.getenv("CORS_ALLOWED_ORIGINS") directly.
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Google Maps ─────────────────────────────────────────────────────────────
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# ─── ML Microservice ─────────────────────────────────────────────────────────
# In production on Render, set ML_SERVICE_URL to the deployed Python service URL.
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ─── Stripe (disabled by default, set env vars to enable) ────────────────────
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# ─── PayPal (disabled by default, set env vars to enable) ────────────────────
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.mode=${PAYPAL_MODE:sandbox}

# ─── Razorpay ────────────────────────────────────────────────────────────────
# Set RAZORPAY_KEY_ID and RAZORPAY_SECRET environment variables for test/live keys.
# If not set, the app falls back to "Pay After Service" only mode gracefully.
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_SECRET:}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.nearnest=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ─── AI / Gemini ─────────────────────────────────────────────────────────────
# Set GEMINI_API_KEY in environment for AI-powered features.
# Without it, the app gracefully falls back to keyword search.
gemini.api.key=AIzaSyDE32XJIq9-0au3cPCYazSMCrJRcNMS_tQ
