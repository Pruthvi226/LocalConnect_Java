version: '3.9'

services:
  # ── MySQL Database ─────────────────────────────
  db:
    image: mysql:8.0
    container_name: proxisense-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxisense
      MYSQL_USER: proxisense
      MYSQL_PASSWORD: proxisense123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxisense-net

  # ── Spring Boot Backend ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proxisense-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/proxisense?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: proxisense
      SPRING_DATASOURCE_PASSWORD: proxisense123
      JWT_SECRET: ProxiSense-Docker-JWT-Secret-Change-In-Prod!
      ML_SERVICE_URL: http://ml:8000
      # Allow both the nginx frontend container and localhost for dev tools
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:80
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxisense-net

  # ── Python ML Microservice ─────────────────────
  ml:
    build:
      context: ./backend-ml
      dockerfile: Dockerfile
    container_name: proxisense-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - proxisense-net

  # ── React Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend URL seen FROM the browser — must be publicly reachable.
        # In a local Docker setup, use localhost (browser talks to host).
        REACT_APP_API_URL: http://localhost:8080/api
        REACT_APP_WS_URL: http://localhost:8080/ws
    container_name: proxisense-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - proxisense-net

  # ── Redis (Cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: proxisense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - proxisense-net

volumes:
  mysql_data:

networks:
  proxisense-net:
    driver: bridge
